<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Complaint Tracker</title>
  <script src="script.js" defer></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-6">
  <h1 class="text-2xl font-bold mb-4">Complaint Tracker</h1>
  
  <form id="complaintForm" class="mb-6">
    <input type="text" id="title" placeholder="Title" class="border p-2 mr-2">
    <input type="text" id="description" placeholder="Description" class="border p-2 mr-2">
    <button type="submit" class="bg-blue-500 text-white px-4 py-2">Submit</button>
  </form>

  <div id="complaintsList"></div>
</body>
</html>
